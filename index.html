<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description"
        content="Interactive educational game for kindergarten students to learn about wild animals through fun activities">
    <title>Wild Animals Adventure</title>
    <link rel="manifest" href="manifest.json?v=fe41b4df">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preload" href="audio/sound-loader.js?v=20260505c" as="script">
    <link rel="preload" href="animal-sounds.js?v=80d35343" as="script">
    <link rel="preload" href="real-animal-sounds.js?v=f5880a00" as="script">
    <link rel="preload" href="interactive-features.js?v=77262e48" as="script">
    <link rel="preload" href="game-core.js?v=4d0489cc" as="script">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <!-- Ensure stylesheet is applied -->
    <link rel="stylesheet" href="styles.css?v=17ed276e">
    <!-- Defer main scripts for performance; already included later in file -->
</head>


<body>
    <!-- Skip link for keyboard users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <button class="sound-btn" onclick="toggleSound()" id="soundBtn" aria-label="Toggle sound on or off"
        aria-pressed="true">🔊</button>
    <div class="game-container" role="main" id="main-content">
        <h1>🦁 Wild Animals Adventure 🐯</h1>
        <p class="subtitle">Learn English Animal Names!</p>

        <div class="high-score" id="highScore" role="status" aria-live="polite">🏆 High Score: 0</div>

        <div class="mode-selection" id="modeSelection" role="group" aria-label="Game mode selection">
            <button class="mode-btn active" onclick="selectMode('classic', this)"
                aria-label="Select Classic Mode with 10 questions" aria-pressed="true">
                🎯 Classic Mode<br><small>10 Questions</small>
            </button>
            <button class="mode-btn" onclick="selectMode('speed', this)" aria-label="Select Speed Mode time challenge"
                aria-pressed="false">
                ⚡ Speed Mode<br><small>Time Challenge</small>
            </button>
            <button class="mode-btn" onclick="selectMode('survival', this)" aria-label="Select Survival Mode play until wrong"
                aria-pressed="false">
                🔥 Survival Mode<br><small>Until Wrong</small>
            </button>
            <button class="mode-btn" onclick="selectMode('quiz', this)" aria-label="Select Quiz Mode with mixed questions"
                aria-pressed="false">
                🧠 Quiz Mode<br><small>Mixed Questions</small>
            </button>
            <button class="mode-btn" onclick="selectMode('habitat', this)"
                aria-label="Select Habitat Match drag and drop game" aria-pressed="false">
                🏠 Habitat Match<br><small>Drag & Drop</small>
            </button>
            <button class="mode-btn" onclick="selectMode('sounds', this)" aria-label="Select Sound Game guess animal sounds"
                aria-pressed="false">
                🔊 Sound Game<br><small>Guess Sounds</small>
            </button>
        </div>

        <div class="score-board" role="status" aria-live="polite">
            <div class="score-item" aria-label="Current score">Score: <span id="score">0</span></div>
            <div class="score-item" aria-label="Question progress">Question: <span id="currentQuestion">1</span> / <span
                    id="totalQuestions">10</span>
            </div>
            <div class="score-item" aria-label="Current streak">Streak: <span id="streak">0</span> 🔥</div>
        </div>
        <div class="game-area" id="gameArea">
            <div class="timer-container" id="timerContainer" style="display: none;">
                <div class="timer-bar">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
                <div class="timer-text" id="timerText">Time: 10s</div>
            </div>

            <div class="powerups" id="powerups" role="group" aria-label="Power-up buttons">
                <button class="powerup-btn" id="hintBtn" onclick="useHint()"
                    aria-label="Use hint power-up, 3 remaining">💡 Hint (3)</button>
                <button class="powerup-btn" id="eliminateBtn" onclick="eliminateWrong()"
                    aria-label="Eliminate wrong answers, 2 remaining">❌ Eliminate (2)</button>
                <button class="powerup-btn" id="skipBtn" onclick="skipQuestion()"
                    aria-label="Skip question, 1 remaining">⏭️ Skip (1)</button>
            </div>

            <div class="animal-display" onclick="playCurrentAnimalSound()" role="button" tabindex="0"
                aria-label="Click or press Enter to hear animal sound">
                <div class="animal-emoji" id="animalEmoji" aria-hidden="true">🦁</div>
                <div class="question" id="question">What animal is this?</div>
                <div class="tap-hint" style="font-size: 0.9em; color: #666; margin-top: 10px;">
                    👆 Tap the animal to hear its sound!
                </div>
            </div>

            <div class="options" id="options" role="group" aria-label="Answer options">
                <!-- Options will be generated by JavaScript -->
            </div>

            <div class="feedback" id="feedback" role="status" aria-live="assertive"></div>

            <div class="question-transition" id="questionTransition" aria-hidden="true">
                <div class="question-transition-track">
                    <div class="question-transition-fill" id="questionTransitionFill"></div>
                </div>
                <div class="question-transition-label" id="questionTransitionLabel">Next animal is getting ready...</div>
            </div>

            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled
                aria-label="Proceed to next question">Next Animal →</button>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script type="module">
      import { initializeGame } from './game-core.js?v=4d0489cc';
      // Initialize the game when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeGame);
      } else {
        initializeGame();
      }
    </script>
    <script defer src="audio/sound-loader.js?v=20260505c"></script>
    <script defer src="animal-sounds.js?v=80d35343"></script>
    <script defer src="real-animal-sounds.js?v=f5880a00"></script>
    <script defer src="interactive-features.js?v=77262e48"></script>
</body>

</html>
