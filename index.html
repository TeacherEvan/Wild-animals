<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Interactive educational game for kindergarten students to learn about wild animals.">
    <title>Wild Animals Adventure</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="src/main.js"></script>
  </head>
  <body>
    <button class="sound-btn" id="soundBtn" aria-label="Toggle sound on or off" aria-pressed="true">🔊</button>
    <main class="game-container">
      <h1>🦁 Wild Animals Adventure 🐯</h1>
      <p class="subtitle">Learn English Animal Names!</p>
      <div class="high-score" id="highScore" aria-live="polite">High Score: 0</div>
      <nav class="mode-selection" id="modeSelection" aria-label="Game mode selection">
        <button class="mode-btn active" data-mode="classic" aria-pressed="true">Classic Mode</button>
        <button class="mode-btn" data-mode="speed" aria-pressed="false">Speed Mode</button>
        <button class="mode-btn" data-mode="survival" aria-pressed="false">Survival Mode</button>
        <button class="mode-btn" data-mode="quiz" aria-pressed="false">Quiz Mode</button>
        <button class="mode-btn" data-mode="habitat" aria-pressed="false">Habitat Match</button>
        <button class="mode-btn" data-mode="sounds" aria-pressed="false">Sound Game</button>
      </nav>
      <section class="score-board" aria-live="polite">
        <div class="score-item">Score: <span id="score">0</span></div>
        <div class="score-item">Question: <span id="currentQuestion">1</span> / <span id="totalQuestions">10</span></div>
        <div class="score-item">Streak: <span id="streak">0</span></div>
      </section>
      <section class="game-area" id="gameArea"></section>
    </main>
  </body>
</html>
